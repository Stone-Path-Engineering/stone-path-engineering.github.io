    <!-- Footer -->
    <footer class="text-center">
        <div class="footer-above">
            <div class="container">
                <div class="row">
                    <div class="footer-col col-md-6">
                        <h3>{{ site.footer.location.title }}</h3>
                        <p>
                            {% for address_line in site.address %}
                                {{ address_line.line }}<br>
                            {% endfor %}
                        </p>
                        <p style="margin-top: 20px;">
                            Proud Member Of<br>
                            <a href="https://www.maplestudios.com/" target="_blank" rel="noopener noreferrer">
                                <img src="{{ site.baseurl }}/img/maple_studios_logo.png" alt="Maple Studios Logo" height="60">
                            </a>
                        </p>
                    </div>
                    <div class="footer-col col-md-6">
                        <h3>{{ site.footer.social }}</h3>
                        <ul class="list-inline">
                            {% for network in site.social %}
                            <li>
                                <a href="{{ network.url }}" class="btn-social btn-outline"><i class="fa fa-fw fa-{{ network.title }}"></i></a>
                            </li>
		                    {% endfor %}
                        </ul>
                    </div>
                </div>
            </div>
        </div>
        <div class="footer-below">
            <div class="container">
                <div class="row">
                    <div class="col-lg-12">
                        Copyright &copy; 20{{ site.time | date: '%y' }} {{ site.footer.copyright }}
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <!-- Scroll to Top Button (Only visible on small and extra-small screen sizes) -->
    <div class="scroll-top page-scroll visible-xs visible-sm">
        <a class="btn btn-primary" href="#page-top">
            <i class="fa fa-chevron-up"></i>
        </a>
    </div>
